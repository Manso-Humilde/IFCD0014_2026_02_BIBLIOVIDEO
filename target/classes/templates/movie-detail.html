<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Película</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<span th:replace="fragment_navbar :: navBar"></span>
<div class="detail-container">

    <h1 th:text="${movie.title}"></h1>

    <div class="movie-grid">
    <img th:src="${movie.urlThumbnail}" th:alt="${movie.title}">
    </div>
    <p>
        <strong>Género:</strong>

        <span th:each="g,iter : ${movie.genres}">
<span th:text="${g.name}"></span>
<span th:if="${!iter.last}"> | </span>
</span>

    </p>

    <div class="video-container">

        <iframe width="800" height="450"
                th:src="@{'https://www.youtube.com/embed/' + ${movie.urlVideo}}"
                title="YouTube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
        </iframe>

    </div>

</div>

</body>
</html>
